<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Assistant — AI Bootcamp Capstone</title>
  <meta name="description" content="Three-mode RAG assistant: document-only, document + AI knowledge, and live web search." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:       #76b900;
      --primary-dark:  #5a8d00;
      --on-primary:    #000;
      --canvas:        #fff;
      --surface-dark:  #000;
      --surface-soft:  #f7f7f7;
      --elevated:      #1a1a1a;
      --hairline:      #cccccc;
      --hairline-str:  #5e5e5e;
      --ink:           #1a1a1a;
      --mute:          #757575;
      --ash:           #a7a7a7;
      --on-dark:       #fff;
      --on-dark-mute:  rgba(255,255,255,0.7);
      --error:         #e52020;
      --success-deep:  #3f8500;
      --sidebar-w:     240px;
      --input-h:       64px;
    }

    html, body { height: 100%; font-family: 'Inter', sans-serif; font-size: 15px; color: var(--ink); background: var(--canvas); }

    /* ── Layout ──────────────────────────────────────────── */
    #app { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ─────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--surface-dark);
      color: var(--on-dark);
      display: flex;
      flex-direction: column;
      padding: 0;
      border-right: 1px solid var(--hairline-str);
    }

    #sidebar-header {
      padding: 20px 16px 16px;
      border-bottom: 1px solid var(--hairline-str);
    }

    #sidebar-header h1 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--primary);
      line-height: 1;
    }

    #sidebar-header p {
      font-size: 11px;
      color: var(--on-dark-mute);
      margin-top: 4px;
      line-height: 1.4;
    }

    .sidebar-section {
      padding: 16px;
      border-bottom: 1px solid var(--hairline-str);
    }

    .sidebar-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--on-dark-mute);
      margin-bottom: 10px;
    }

    /* Mode selector */
    .mode-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 13px;
      color: var(--on-dark-mute);
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }
    .mode-option:hover { background: rgba(255,255,255,0.06); color: var(--on-dark); }
    .mode-option input[type="radio"] { display: none; }
    .mode-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 1.5px solid var(--hairline-str);
      flex-shrink: 0;
    }
    .mode-option.active { color: var(--on-dark); }
    .mode-option.active .mode-dot { background: var(--primary); border-color: var(--primary); }

    /* Upload section */
    #upload-section { display: flex; flex-direction: column; gap: 8px; }

    #file-input { display: none; }

    #file-label {
      font-size: 12px;
      color: var(--on-dark-mute);
      padding: 6px 8px;
      border: 1px dashed var(--hairline-str);
      border-radius: 2px;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.15s, color 0.15s;
    }
    #file-label:hover { border-color: var(--primary); color: var(--on-dark); }
    #file-label.has-file { border-color: var(--primary); color: var(--primary); }

    #btn-upload {
      height: 32px;
      background: var(--primary);
      color: var(--on-primary);
      border: none;
      border-radius: 2px;
      font-size: 12.5px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    #btn-upload:hover { background: var(--primary-dark); }
    #btn-upload:disabled { background: var(--elevated); color: var(--ash); cursor: not-allowed; }

    #upload-status {
      font-size: 11px;
      color: var(--on-dark-mute);
      line-height: 1.4;
      min-height: 14px;
    }
    #upload-status.ok  { color: var(--primary); }
    #upload-status.err { color: var(--error); }

    /* ── Main area ───────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--canvas);
    }

    /* Top bar */
    #topbar {
      height: 48px;
      background: var(--surface-soft);
      border-bottom: 1px solid var(--hairline);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 8px;
      flex-shrink: 0;
    }

    #topbar-mode {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--mute);
    }

    #topbar-mode span { color: var(--primary); }

    /* Chat area */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* System notice */
    .notice {
      font-size: 12px;
      color: var(--mute);
      text-align: center;
      padding: 8px 16px;
      border: 1px solid var(--hairline);
      border-radius: 2px;
      background: var(--surface-soft);
      align-self: center;
      max-width: 440px;
    }

    /* Message bubbles */
    .msg-row { display: flex; flex-direction: column; max-width: 72%; }
    .msg-row.user { align-self: flex-end; align-items: flex-end; }
    .msg-row.assistant { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 2px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg-row.user .bubble {
      background: var(--primary);
      color: var(--on-primary);
    }
    .msg-row.assistant .bubble {
      background: var(--surface-soft);
      color: var(--ink);
      border: 1px solid var(--hairline);
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 14px;
      background: var(--surface-soft);
      border: 1px solid var(--hairline);
      border-radius: 2px;
    }
    .typing-indicator span {
      width: 5px; height: 5px;
      background: var(--ash);
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }

    /* Sources toggle */
    .sources-toggle {
      margin-top: 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--mute);
      cursor: pointer;
      user-select: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .sources-toggle:hover { color: var(--ink); }
    .sources-toggle svg { transition: transform 0.15s; }
    .sources-toggle.open svg { transform: rotate(90deg); }

    .sources-list {
      display: none;
      flex-direction: column;
      gap: 3px;
      margin-top: 5px;
      padding: 8px 10px;
      background: var(--surface-soft);
      border: 1px solid var(--hairline);
      border-radius: 2px;
    }
    .sources-list.visible { display: flex; }
    .sources-list a, .sources-list span {
      font-size: 11px;
      color: var(--mute);
      text-decoration: none;
      line-height: 1.5;
      word-break: break-all;
    }
    .sources-list a:hover { color: var(--ink); text-decoration: underline; }

    /* Input bar */
    #input-bar {
      flex-shrink: 0;
      border-top: 1px solid var(--hairline);
      padding: 12px 20px;
      display: flex;
      gap: 8px;
      background: var(--canvas);
    }

    #question-input {
      flex: 1;
      height: 40px;
      border: 1px solid var(--hairline);
      border-radius: 2px;
      padding: 0 12px;
      font-family: inherit;
      font-size: 14px;
      color: var(--ink);
      outline: none;
      background: var(--canvas);
      transition: border-color 0.15s;
    }
    #question-input:focus { border-color: var(--primary); }

    #btn-send {
      height: 40px;
      padding: 0 18px;
      background: var(--primary);
      color: var(--on-primary);
      border: none;
      border-radius: 2px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #btn-send:hover { background: var(--primary-dark); }
    #btn-send:disabled { background: var(--surface-soft); color: var(--ash); cursor: not-allowed; }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Sidebar ── -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <h1>RAG Assistant</h1>
      <p>AI Bootcamp Capstone</p>
    </div>

    <!-- Mode selector -->
    <div class="sidebar-section">
      <div class="sidebar-label">Mode</div>
      <label class="mode-option active" id="mode-label-1">
        <input type="radio" name="mode" value="1" checked />
        <span class="mode-dot"></span>
        Document Only
      </label>
      <label class="mode-option" id="mode-label-2">
        <input type="radio" name="mode" value="2" />
        <span class="mode-dot"></span>
        Document + AI Knowledge
      </label>
      <label class="mode-option" id="mode-label-3">
        <input type="radio" name="mode" value="3" />
        <span class="mode-dot"></span>
        Web Search
      </label>
    </div>

    <!-- Upload section (hidden for mode 3) -->
    <div class="sidebar-section" id="upload-section">
      <div class="sidebar-label">Upload Document</div>
      <input type="file" id="file-input" accept=".pdf" />
      <label for="file-input" id="file-label">Choose PDF</label>
      <button id="btn-upload">Upload</button>
      <div id="upload-status">No document uploaded yet.</div>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main id="main">
    <div id="topbar">
      <span id="topbar-mode">Mode: <span id="mode-name">Document Only</span></span>
    </div>
    <div id="chat"></div>
    <div id="input-bar">
      <input id="question-input" type="text" placeholder="Ask a question..." autocomplete="off" />
      <button id="btn-send">Send</button>
    </div>
  </main>

</div>
<script>
  // ── CHANGE THIS before deploying to Vercel ──
  const API_URL = "http://localhost:8000";

  const modeNames = { 1: "Document Only", 2: "Document + AI Knowledge", 3: "Web Search" };
  let currentMode = 1;

  const chat         = document.getElementById("chat");
  const questionInput = document.getElementById("question-input");
  const btnSend      = document.getElementById("btn-send");
  const btnUpload    = document.getElementById("btn-upload");
  const fileInput    = document.getElementById("file-input");
  const fileLabel    = document.getElementById("file-label");
  const uploadStatus = document.getElementById("upload-status");
  const uploadSection = document.getElementById("upload-section");
  const modeNameEl   = document.getElementById("mode-name");

  // ── Mode switching ──────────────────────────────────────
  document.querySelectorAll('input[name="mode"]').forEach(radio => {
    radio.addEventListener("change", () => {
      currentMode = parseInt(radio.value);
      document.querySelectorAll(".mode-option").forEach(l => l.classList.remove("active"));
      document.getElementById(`mode-label-${currentMode}`).classList.add("active");
      modeNameEl.textContent = modeNames[currentMode];
      uploadSection.style.display = currentMode === 3 ? "none" : "";
      checkIndexStatus();
    });
  });

  // ── File picker label ───────────────────────────────────
  fileInput.addEventListener("change", () => {
    if (fileInput.files.length) {
      fileLabel.textContent = fileInput.files[0].name;
      fileLabel.classList.add("has-file");
    } else {
      fileLabel.textContent = "Choose PDF";
      fileLabel.classList.remove("has-file");
    }
  });

  // ── Upload ──────────────────────────────────────────────
  btnUpload.addEventListener("click", async () => {
    if (!fileInput.files.length) return;
    btnUpload.disabled = true;
    btnUpload.textContent = "Uploading...";
    uploadStatus.className = "";
    uploadStatus.textContent = "Processing...";
    const form = new FormData();
    form.append("file", fileInput.files[0]);
    try {
      const res = await fetch(`${API_URL}/ingest`, { method: "POST", body: form });
      const data = await res.json();
      if (res.ok) {
        uploadStatus.textContent = `Indexed ${data.chunks} chunks.`;
        uploadStatus.className = "ok";
        removeNotices();
      } else {
        uploadStatus.textContent = data.detail || "Upload failed.";
        uploadStatus.className = "err";
      }
    } catch (e) {
      uploadStatus.textContent = "Server unreachable.";
      uploadStatus.className = "err";
    } finally {
      btnUpload.disabled = false;
      btnUpload.textContent = "Upload";
    }
  });

  // ── Health + index status on load ──────────────────────
  async function checkIndexStatus() {
    if (currentMode === 3) return;
    try {
      const res = await fetch(`${API_URL}/index-status`);
      const data = await res.json();
      if (!data.indexed) showNotice("No document uploaded yet. Upload a PDF to start.");
    } catch { showNotice("Could not reach the server. Make sure the API is running."); }
  }

  function showNotice(msg) {
    removeNotices();
    const div = document.createElement("div");
    div.className = "notice";
    div.textContent = msg;
    chat.prepend(div);
  }
  function removeNotices() {
    chat.querySelectorAll(".notice").forEach(n => n.remove());
  }

  // ── Send message ────────────────────────────────────────
  async function sendMessage() {
    const q = questionInput.value.trim();
    if (!q) return;
    questionInput.value = "";
    appendUserMessage(q);
    const typingRow = appendTyping();
    btnSend.disabled = true;
    questionInput.disabled = true;
    try {
      const res = await fetch(`${API_URL}/ask`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question: q, mode: currentMode }),
      });
      const data = await res.json();
      typingRow.remove();
      if (res.ok) appendAssistantMessage(data.answer, data.sources || []);
      else appendAssistantMessage(data.detail || "An error occurred.", []);
    } catch {
      typingRow.remove();
      appendAssistantMessage("Server unreachable. Make sure the API is running.", []);
    } finally {
      btnSend.disabled = false;
      questionInput.disabled = false;
      questionInput.focus();
    }
  }

  btnSend.addEventListener("click", sendMessage);
  questionInput.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) sendMessage(); });

  // ── DOM helpers ─────────────────────────────────────────
  function appendUserMessage(text) {
    const row = document.createElement("div");
    row.className = "msg-row user";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    row.appendChild(bubble);
    chat.appendChild(row);
    scrollBottom();
  }

  function appendTyping() {
    const row = document.createElement("div");
    row.className = "msg-row assistant";
    row.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
    chat.appendChild(row);
    scrollBottom();
    return row;
  }

  function appendAssistantMessage(text, sources) {
    const row = document.createElement("div");
    row.className = "msg-row assistant";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    row.appendChild(bubble);

    if (sources && sources.length) {
      const toggle = document.createElement("div");
      toggle.className = "sources-toggle";
      toggle.innerHTML = `<svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M2 1l4 3-4 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg> Sources (${sources.length})`;

      const list = document.createElement("div");
      list.className = "sources-list";
      sources.forEach(src => {
        const item = document.createElement("div");
        const isUrl = src.startsWith("http");
        if (isUrl) {
          const a = document.createElement("a");
          a.href = src; a.target = "_blank"; a.rel = "noopener noreferrer";
          a.textContent = src;
          item.appendChild(a);
        } else {
          const s = document.createElement("span");
          s.textContent = src;
          item.appendChild(s);
        }
        list.appendChild(item);
      });

      toggle.addEventListener("click", () => {
        toggle.classList.toggle("open");
        list.classList.toggle("visible");
      });

      row.appendChild(toggle);
      row.appendChild(list);
    }

    chat.appendChild(row);
    scrollBottom();
  }

  function scrollBottom() {
    chat.scrollTop = chat.scrollHeight;
  }

  // ── Init ────────────────────────────────────────────────
  checkIndexStatus();
  questionInput.focus();
</script>
</body>
</html>
